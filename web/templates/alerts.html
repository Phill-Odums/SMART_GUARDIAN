{% extends "base.html" %}

{% block title %}Alerts{% endblock %}
{% block header_title %}Alert Timeline{% endblock %}

{% block content %}
<div class="h-full flex flex-col space-y-4">

    <!-- Filters Bar -->
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center bg-panel border border-border rounded-xl p-4 shadow-lg backdrop-blur-md gap-4">
        <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">
            <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Filter by:</span>
            <select id="filter-camera" onchange="applyFilters()"
                class="bg-black/40 border border-border rounded-lg px-3 py-2 text-sm outline-none focus:border-cyan-500 transition text-white min-w-[140px]">
                <option value="all">All Cameras</option>
            </select>
            <select id="filter-type" onchange="applyFilters()"
                class="bg-black/40 border border-border rounded-lg px-3 py-2 text-sm outline-none focus:border-cyan-500 transition text-white min-w-[120px]">
                <option value="all">Type: All</option>
                <option value="person">Person</option>
                <option value="gun">Gun</option>
                <option value="knife">Knife</option>
                <option value="sword">Sword</option>
            </select>
        </div>

        <div class="flex items-center space-x-3">
            <button onclick="loadAlerts()"
                class="flex items-center space-x-1.5 bg-white/5 hover:bg-white/10 text-white px-4 py-2 rounded-lg text-sm font-bold transition border border-white/5">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                <span>Refresh</span>
            </button>
            <button onclick="clearAlerts()"
                class="flex items-center space-x-1.5 bg-red-500/10 hover:bg-red-500/20 text-red-400 px-4 py-2 rounded-lg text-sm font-bold transition border border-red-500/20">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
                <span class="hidden sm:inline">Clear All</span>
            </button>
        </div>
    </div>

    <!-- Count bar -->
    <div class="flex items-center justify-between px-1 text-sm text-slate-500">
        <span id="alert-count">Loading alerts...</span>
        <span class="text-xs flex items-center gap-1"><i data-lucide="refresh-cw" class="w-3 h-3"></i> Auto-refreshes every 15s</span>
    </div>

    <!-- Alerts Grid -->
    <div class="flex-1 overflow-y-auto pr-1 custom-scrollbar">
        <div id="alerts-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 gap-4 pb-4">
            <div class="col-span-full p-8 text-center text-slate-500">
                <i data-lucide="loader-2" class="w-5 h-5 inline animate-spin mr-2"></i> Loading alerts...
            </div>
        </div>
    </div>
</div>

<!-- Lightbox -->
<div id="lightbox" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" onclick="closeLightbox()">
    <img id="lightbox-img" src="" class="max-w-full max-h-full rounded-xl shadow-2xl" onclick="event.stopPropagation()">
</div>

<script>
    const TYPE_BADGE = {
        person: { bg: 'bg-purple-500', label: 'PERSON' },
        gun:    { bg: 'bg-red-500',    label: 'GUN' },
        knife:  { bg: 'bg-orange-500', label: 'KNIFE' },
        sword:  { bg: 'bg-amber-500',  label: 'SWORD' },
    };

    let allAlerts = [];

    function badgeFor(message) {
        const m = (message || '').toLowerCase();
        for (const [key, val] of Object.entries(TYPE_BADGE)) {
            if (m.includes(key)) return val;
        }
        return { bg: 'bg-slate-500', label: 'ALERT' };
    }

    function formatTime(ts) {
        if (!ts) return '';
        try {
            const d = new Date(ts.replace(' ', 'T'));
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } catch { return ts; }
    }

    function renderCard(a) {
        const badge = badgeFor(a.message);
        const hasImg = !!a.image_path;
        const imgSrc = hasImg ? `/alert_image?path=${encodeURIComponent(a.image_path)}` : '';
        const imgTag = hasImg
            ? `<img src="${imgSrc}" alt="Alert Snapshot" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition group-hover:scale-105 duration-500" onerror="this.style.display='none'">`
            : `<div class="w-full h-full flex items-center justify-center text-slate-600"><i data-lucide="shield-alert" class="w-10 h-10"></i></div>`;

        return `<div class="bg-panel border border-border rounded-xl overflow-hidden shadow-lg group">
            <div class="relative h-40 bg-black/60 overflow-hidden cursor-pointer" onclick="${hasImg ? `openLightbox('${imgSrc}')` : ''}">
                ${imgTag}
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
                <div class="absolute top-3 left-3 ${badge.bg} text-white text-[10px] font-bold px-2 py-0.5 rounded shadow">${badge.label}</div>
                <div class="absolute top-3 right-3 text-white text-xs font-mono drop-shadow-md bg-black/50 px-2 py-0.5 rounded backdrop-blur">
                    <i data-lucide="video" class="w-3 h-3 inline mr-1"></i> CAM-${String(a.camera_id).padStart(2,'0')}
                </div>
            </div>
            <div class="p-4">
                <div class="flex justify-between items-start mb-2">
                    <h3 class="font-bold text-slate-200 text-sm truncate pr-2">${a.message || 'Alert'}</h3>
                    <span class="text-xs text-slate-400 font-mono shrink-0">${formatTime(a.timestamp)}</span>
                </div>
                <p class="text-xs text-slate-500 mb-3">${a.timestamp || ''}</p>
                <div class="flex items-center justify-between">
                    <div class="flex space-x-2">
                        ${hasImg ? `<button onclick="openLightbox('${imgSrc}')" class="text-slate-400 hover:text-cyan-400 transition" title="View Full Image"><i data-lucide="maximize" class="w-4 h-4"></i></button>` : ''}
                    </div>
                    <button onclick="deleteAlert(${a.id})" class="text-xs text-red-400 hover:text-red-300 transition font-medium">Delete</button>
                </div>
            </div>
        </div>`;
    }

    function applyFilters() {
        const cam = document.getElementById('filter-camera').value;
        const type = document.getElementById('filter-type').value;
        let filtered = allAlerts;
        if (cam !== 'all') filtered = filtered.filter(a => String(a.camera_id) === cam);
        if (type !== 'all') filtered = filtered.filter(a => (a.message || '').toLowerCase().includes(type));
        renderGrid(filtered);
    }

    function renderGrid(alerts) {
        const grid = document.getElementById('alerts-grid');
        if (!alerts.length) {
            grid.innerHTML = `<div class="col-span-full p-12 text-center text-slate-500">
                <i data-lucide="bell-off" class="w-10 h-10 mx-auto mb-3 opacity-30"></i>
                <p>No alerts yet. Detections will appear here when AI triggers an alert.</p>
            </div>`;
            lucide.createIcons();
            document.getElementById('alert-count').textContent = '0 alerts';
            return;
        }
        grid.innerHTML = alerts.map(renderCard).join('');
        document.getElementById('alert-count').textContent = `${alerts.length} alert${alerts.length !== 1 ? 's' : ''} (showing ${alerts.length} of ${allAlerts.length})`;
        lucide.createIcons();
    }

    async function loadAlerts() {
        try {
            const res = await fetch('/get_alerts');
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            allAlerts = data.alerts || [];

            // Populate camera filter dynamically
            const cams = [...new Set(allAlerts.map(a => String(a.camera_id)))].sort();
            const sel = document.getElementById('filter-camera');
            sel.innerHTML = '<option value="all">All Cameras</option>' +
                cams.map(c => `<option value="${c}">CAM-${c.padStart(2,'0')}</option>`).join('');

            applyFilters();
        } catch (err) {
            document.getElementById('alerts-grid').innerHTML =
                `<div class="col-span-full p-8 text-center text-red-400">Error loading alerts: ${err.message}</div>`;
            document.getElementById('alert-count').textContent = 'Error';
        }
    }

    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').classList.remove('hidden');
    }
    function closeLightbox() {
        document.getElementById('lightbox').classList.add('hidden');
    }

    async function deleteAlert(id) {
        if (!confirm('Delete this alert?')) return;
        try {
            await fetch(`/delete_alert/${id}`, { method: 'DELETE' });
            loadAlerts();
        } catch (e) { alert('Delete failed: ' + e.message); }
    }

    async function clearAlerts() {
        if (!confirm('Clear ALL alerts? This cannot be undone.')) return;
        try {
            await fetch('/clear_alerts', { method: 'DELETE' });
            loadAlerts();
        } catch (e) { alert('Clear failed: ' + e.message); }
    }

    loadAlerts();
    setInterval(loadAlerts, 15000);
</script>
{% endblock %}
